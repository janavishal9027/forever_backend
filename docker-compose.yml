version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: forever-db
    environment:
      POSTGRES_DB: forever
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: forever-backend
    ports:
      - "4000:4000"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/forever
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      APP_JWT_SECRET: ${JWT_SECRET:-Zm9yZXZlci1lY29tbWVyY2UtYXBwLXNlY3JldC1rZXktMjU2LWJpdHMtbG9uZw==}
      APP_ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@forever.com}
      APP_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      APP_CORS_ALLOWED_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
