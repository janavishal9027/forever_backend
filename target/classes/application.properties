# Server Configuration
server.port=${PORT:4000}
server.address=0.0.0.0

# PostgreSQL Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/forever}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool - keep alive for Render
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=30000

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET:Zm9yZXZlci1lY29tbWVyY2UtYXBwLXNlY3JldC1rZXktMjU2LWJpdHMtbG9uZw==}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# Admin Credentials
app.admin.email=${APP_ADMIN_EMAIL:admin@forever.com}
app.admin.password=${APP_ADMIN_PASSWORD:admin123}

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:djlceoq09}
